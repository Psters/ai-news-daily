<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI News Daily - 每日AI前沿动态追踪">
    <title>AI News Daily</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <div class="meta">
                <span class="date" id="current-date">加载中...</span>
                <span class="separator">·</span>
                <span class="tag">AI 前沿动态</span>
            </div>
            <h1 class="title">AI News Daily</h1>
            <p class="subtitle">每日 AI 前沿动态追踪，自动更新</p>
        </div>
    </header>

    <main class="content">
        <div class="container">
            <section class="summary">
                <div class="summary-card">
                    <div class="summary-number" id="news-count">-</div>
                    <div class="summary-label">条新闻</div>
                </div>
                <div class="summary-card">
                    <div class="summary-number" id="category-count">-</div>
                    <div class="summary-label">个分类</div>
                </div>
                <div class="summary-card">
                    <div class="summary-number" id="update-time">-</div>
                    <div class="summary-label">最后更新</div>
                </div>
            </section>

            <div id="news-container" class="news-container">
                <!-- 新闻内容将通过 JavaScript 动态加载 -->
                <div class="loading">加载中...</div>
            </div>

            <footer class="footer">
                <p>数据来源：Tavily Search API</p>
                <p>本页面由 AI 自动生成，数据实时更新</p>
                <p><a href="https://github.com/Psters/ai-news-daily" target="_blank">GitHub</a></p>
            </footer>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
